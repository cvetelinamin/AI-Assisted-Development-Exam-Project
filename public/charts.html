<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Distribution - Pie Chart</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .page-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-section h1 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-weight: 800;
            font-size: 2rem;
        }

        .header-section p {
            color: #666;
            margin: 0;
            font-size: 1.05rem;
        }

        .chart-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .chart-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.9), rgba(118, 75, 162, 0.9));
            color: white;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .stat-card .label {
            font-size: 14px;
            opacity: 0.95;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 800;
        }

        .filter-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .filter-section h5 {
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .btn-group-custom {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-custom {
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .btn-custom:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-custom.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .loading-spinner {
            display: none;
            text-align: center;
            padding: 60px;
            flex-direction: column;
        }

        .spinner-border {
            width: 50px;
            height: 50px;
            border-color: rgba(255, 255, 255, 0.3);
            border-right-color: white;
        }

        .error-message {
            display: none;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(239, 68, 68, 0.05));
            border: 2px solid rgba(239, 68, 68, 0.3);
            color: #991b1b;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .legend-custom {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(240, 147, 251, 0.05));
            border-radius: 16px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .legend-custom h6 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
            font-size: 15px;
            transition: all 0.2s;
            padding: 8px;
            border-radius: 8px;
        }

        .legend-item:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .legend-color {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            margin-right: 12px;
        }

        .legend-label {
            color: #333;
            font-weight: 600;
            flex: 1;
        }

        .legend-amount {
            color: #666;
            font-size: 14px;
            min-width: 100px;
            text-align: right;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            .header-section {
                padding: 25px;
            }

            .chart-section {
                padding: 25px;
            }

            .chart-wrapper {
                max-width: 100%;
                padding: 10px;
            }

            .stat-card .value {
                font-size: 26px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .btn-group-custom {
                flex-direction: column;
            }

            .btn-custom {
                width: 100%;
            }

            .header-section h1 {
                font-size: 1.5rem;
            }
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .no-data p {
            font-size: 18px;
            margin: 0;
            font-weight: 600;
        }

        .form-label {
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .form-control {
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            outline: none;
        }
    </style>
</head>

<body>
    <div class="page-container">
        <!-- Header Section -->
        <div class="header-section">
            <h1>💰 Expense Distribution</h1>
            <p>View your spending patterns by category</p>
        </div>

        <!-- Filter Section -->
        <div class="filter-section">
            <h5>Filter by Date Range</h5>
            <div class="row g-2">
                <div class="col-md-4">
                    <label class="form-label">Start Date</label>
                    <input type="date" id="startDate" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">End Date</label>
                    <input type="date" id="endDate" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">&nbsp;</label>
                    <div class="btn-group-custom">
                        <button class="btn-custom active" onclick="applyFilter()">Apply Filter</button>
                        <button class="btn-custom" onclick="resetFilter()">Reset</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage"></div>

        <!-- Chart Section -->
        <div class="chart-section">
            <div class="loading-spinner" id="loadingSpinner">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3">Loading expense data...</p>
            </div>

            <div id="noDataMessage" class="no-data" style="display: none;">
                <p>No expense data available</p>
            </div>

            <div id="chartContainer" style="display: none;">
                <h4 class="mb-4" style="color: #333; font-weight: 600;">Category Distribution</h4>
                <div class="chart-wrapper">
                    <canvas id="expensePieChart"></canvas>
                </div>

                <!-- Custom Legend -->
                <div class="legend-custom">
                    <h6 style="color: #333; font-weight: 600; margin-bottom: 15px;">Category Details</h6>
                    <div id="customLegend"></div>
                </div>
            </div>

            <!-- Statistics Cards -->
            <div class="stats-grid" id="statsGrid" style="display: none;">
                <div class="stat-card">
                    <div class="label">Total Spending</div>
                    <div class="value" id="totalSpending">$0.00</div>
                </div>
                <div class="stat-card">
                    <div class="label">Expense Count</div>
                    <div class="value" id="expenseCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">Average Expense</div>
                    <div class="value" id="averageExpense">$0.00</div>
                </div>
                <div class="stat-card">
                    <div class="label">Top Category</div>
                    <div class="value" id="topCategory">-</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Color palette for pie chart
        const COLORS = [
            'rgba(255, 99, 132, 0.8)',
            'rgba(54, 162, 235, 0.8)',
            'rgba(255, 206, 86, 0.8)',
            'rgba(75, 192, 192, 0.8)',
            'rgba(153, 102, 255, 0.8)',
            'rgba(255, 159, 64, 0.8)',
            'rgba(199, 199, 199, 0.8)',
            'rgba(83, 102, 255, 0.8)',
            'rgba(255, 99, 255, 0.8)',
            'rgba(99, 255, 132, 0.8)',
        ];

        const BORDER_COLORS = [
            'rgb(255, 99, 132)',
            'rgb(54, 162, 235)',
            'rgb(255, 206, 86)',
            'rgb(75, 192, 192)',
            'rgb(153, 102, 255)',
            'rgb(255, 159, 64)',
            'rgb(199, 199, 199)',
            'rgb(83, 102, 255)',
            'rgb(255, 99, 255)',
            'rgb(99, 255, 132)',
        ];

        let chart = null;
        let currentAnalytics = null;

        // Initialize date inputs with default values
        function initializeDateInputs() {
            const today = new Date();
            const thirtyDaysAgo = new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);

            document.getElementById('endDate').valueAsDate = today;
            document.getElementById('startDate').valueAsDate = thirtyDaysAgo;
        }

        // Show loading state
        function showLoading() {
            document.getElementById('loadingSpinner').style.display = 'block';
            document.getElementById('chartContainer').style.display = 'none';
            document.getElementById('statsGrid').style.display = 'none';
            document.getElementById('noDataMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('loadingSpinner').style.display = 'none';
            document.getElementById('chartContainer').style.display = 'none';
            document.getElementById('statsGrid').style.display = 'none';
            document.getElementById('noDataMessage').style.display = 'none';
        }

        // Format currency
        function formatCurrency(value) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD'
            }).format(value);
        }

        // Fetch and display analytics
        async function fetchAnalytics() {
            showLoading();

            try {
                const startDate = document.getElementById('startDate').value;
                const endDate = document.getElementById('endDate').value;

                let url = '/api/analytics/summary';
                if (startDate && endDate) {
                    url += `?startDate=${startDate}&endDate=${endDate}`;
                }

                console.log('Fetching analytics from:', url);
                const response = await fetch(url);

                console.log('Response status:', response.status);
                const contentType = response.headers.get('content-type');

                if (!response.ok) {
                    const errorData = contentType && contentType.includes('application/json')
                        ? await response.json()
                        : { error: `HTTP ${response.status}` };
                    throw new Error(errorData.details || errorData.error || 'Failed to fetch analytics');
                }

                const analytics = await response.json();
                currentAnalytics = analytics;

                console.log('Analytics data received:', analytics);

                // Check if there's data
                if (!analytics.summary || analytics.summary.expenseCount === 0) {
                    document.getElementById('noDataMessage').style.display = 'block';
                    document.getElementById('loadingSpinner').style.display = 'none';
                    return;
                }

                renderChart(analytics);
                updateStatistics(analytics);
                renderCustomLegend(analytics);

                document.getElementById('chartContainer').style.display = 'block';
                document.getElementById('statsGrid').style.display = 'grid';
                document.getElementById('loadingSpinner').style.display = 'none';
            } catch (error) {
                console.error('Error fetching analytics:', error);
                showError(error.message || 'Unable to load analytics data. Please try again.');
            }
        }

        // Render pie chart
        function renderChart(analytics) {
            const ctx = document.getElementById('expensePieChart');

            // Destroy existing chart if it exists
            if (chart) {
                chart.destroy();
            }

            const categoryData = analytics.byCategory.spending;
            const labels = Object.keys(categoryData);
            const data = Object.values(categoryData);
            const percentages = analytics.byCategory.percentages;

            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: COLORS.slice(0, labels.length),
                        borderColor: BORDER_COLORS.slice(0, labels.length),
                        borderWidth: 2,
                        borderJoinStyle: 'round',
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                font: {
                                    size: 14,
                                    weight: '600',
                                    family: "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif"
                                },
                                color: '#333',
                                usePointStyle: true,
                                pointStyle: 'circle'
                            }
                        },
                        tooltip: {
                            enabled: true,
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            padding: 12,
                            titleFont: {
                                size: 14,
                                weight: 'bold'
                            },
                            bodyFont: {
                                size: 13
                            },
                            borderColor: 'rgba(255, 255, 255, 0.2)',
                            borderWidth: 1,
                            cornerRadius: 6,
                            caretPadding: 10,
                            callbacks: {
                                label: function (context) {
                                    const label = context.label || '';
                                    const value = formatCurrency(context.parsed.y);
                                    const percentage = percentages[label] || 0;
                                    return `${label}: ${value} (${percentage}%)`;
                                }
                            }
                        },
                        // Custom percentage labels on the pie slices
                        datalabels: {
                            color: '#fff',
                            font: {
                                weight: 'bold'
                            }
                        }
                    }
                }
            });
        }

        // Update statistics cards
        function updateStatistics(analytics) {
            const summary = analytics.summary;
            const byCategory = analytics.byCategory.spending;

            // Total spending
            document.getElementById('totalSpending').textContent =
                formatCurrency(summary.totalSpending);

            // Expense count
            document.getElementById('expenseCount').textContent =
                summary.expenseCount;

            // Average expense
            document.getElementById('averageExpense').textContent =
                formatCurrency(summary.averageExpense);

            // Top category
            const topCategory = summary.highestSpendingCategory.category || '-';
            document.getElementById('topCategory').textContent = topCategory;
        }

        // Render custom legend with percentages
        function renderCustomLegend(analytics) {
            const byCategory = analytics.byCategory.spending;
            const percentages = analytics.byCategory.percentages;
            const legendContainer = document.getElementById('customLegend');

            let legendHTML = '';

            Object.entries(byCategory).forEach((entry, index) => {
                const category = entry[0];
                const amount = entry[1];
                const percentage = percentages[category] || 0;
                const color = COLORS[index % COLORS.length];

                legendHTML += `
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: ${color};"></div>
                        <div class="legend-label">${category}</div>
                        <div class="legend-amount">
                            ${formatCurrency(amount)} (${percentage}%)
                        </div>
                    </div>
                `;
            });

            legendContainer.innerHTML = legendHTML;
        }

        // Apply filter
        function applyFilter() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            if (!startDate || !endDate) {
                showError('Please select both start and end dates');
                return;
            }

            if (new Date(startDate) > new Date(endDate)) {
                showError('Start date must be before end date');
                return;
            }

            fetchAnalytics();
        }

        // Reset filter
        function resetFilter() {
            initializeDateInputs();
            fetchAnalytics();
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function () {
            initializeDateInputs();
            fetchAnalytics();
        });
    </script>
</body>

</html>
